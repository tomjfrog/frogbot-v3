name: "Frogbot Scan Pull Request"
on:
  pull_request_target:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    # Protected GitHub Environment with required reviewers.
    # Frogbot enforces this for public repos using pull_request_target
    # so forked-PR runs can't exfiltrate the JFrog token.
    environment: frogbot
    steps:
      - uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_FAIL: "TRUE"
          JF_MIN_SEVERITY: "Medium"
          JF_INCLUDE_ALL_VULNERABILITIES: "FALSE"
